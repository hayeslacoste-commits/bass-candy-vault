name: Force Deploy Lovable to Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Force Install Packages
        run: npm install --legacy-peer-deps || true

      - name: Force Build Application
        run: CI=false npm run build -- --emptyOutDir || true

      - name: Emergency Folder Fallback
        run: |
          if [ ! -d "dist" ]; then
            echo "Vite build failed to make dist folder, forcing manual fallback..."
            mkdir dist
            cp index.html dist/ || true
            cp -r public/* dist/ 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
